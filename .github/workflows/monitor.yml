name: Nightly monitoring

on:
  schedule:
    # 06:00 UTC every day (08:00 EEST) — after Froide backup window
    - cron: "0 6 * * *"
  workflow_dispatch:  # manual run always possible

permissions:
  contents: read
  issues: write  # to open alert issues automatically

jobs:
  smoke:
    name: Smoke tests (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run smoke tests
        id: smoke
        env:
          SMOKE_TEST_URL: ${{ vars.MCP_SERVICE_URL }}
          SMOKE_SESSION_TOKEN: ${{ secrets.SMOKE_SESSION_TOKEN }}
        run: |
          pytest tests/test_smoke.py \
            -v \
            --tb=short \
            --junit-xml=smoke-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ github.run_id }}
          path: smoke-results.xml
          retention-days: 30

      # ── Auto-open GitHub Issue on failure ──────────────────────────────────
      - name: Open alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Monitoring alert: smoke tests failed ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## Nightly smoke test failure',
              '',
              `**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              '### What to check',
              '- [ ] `GET /healthz` responds on the Cloud Run service',
              '- [ ] `GET /mcp` without session header returns 401 from middleware (not 5xx)',
              '- [ ] Valid `SMOKE_SESSION_TOKEN` passes auth middleware (token may have expired — rotate if needed)',
              '- [ ] Authenticated `tools/call` -> `get_my_profile` reaches Froide successfully',
              '- [ ] Froide REST API is reachable from the MCP service',
              '- [ ] Cloud Run service is not scaled to zero with cold-start timeout',
              '- [ ] GCP project quotas / billing alerts',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitoring',
            });
            const alreadyOpen = existing.data.some(i => i.title.includes('Monitoring alert'));
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['monitoring', 'bug'],
              });
            }
