name: Nightly monitoring

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC = 07:00 EEST
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # required to open an alert issue on failure

jobs:
  smoke:
    name: Nightly smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -e .[dev]

      - name: Run smoke tests
        id: smoke
        env:
          MCP_SERVICE_URL: ${{ vars.MCP_SERVICE_URL }}
          SMOKE_SESSION_TOKEN: ${{ secrets.SMOKE_SESSION_TOKEN }}
        run: |
          pytest tests/test_smoke.py -v --tb=short 2>&1 | tee smoke_output.txt
          exit ${PIPESTATUS[0]}

      - name: Open alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('smoke_output.txt', 'utf8').slice(-3000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[nightly] Smoke test failed ${new Date().toISOString().slice(0,10)}`,
              body: `Nightly smoke test failed.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n<details><summary>Output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>\n\n**Likely cause:** expired \`SMOKE_SESSION_TOKEN\` (8 h TTL) or service regression. Rotate the secret if tests pass locally.`,
              labels: ['monitoring']
            });
